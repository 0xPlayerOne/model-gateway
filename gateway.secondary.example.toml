[server]
bind = "127.0.0.1:8008"
local_base_url = "http://127.0.0.1:8000/v1"
exposure = "loopback"

[providers.mistral]
profile = "mistral"
adapter = "openai_chat"
base_url = "https://api.mistral.ai/v1"
api_key_secret = "MISTRAL_API_KEY"

[providers.nous-portal]
profile = "nous_portal"
adapter = "openai_chat"
base_url = "https://inference-api.nousresearch.com/v1"
api_key_secret = "NOUS_PORTAL_API_KEY"

[providers.nvidia-nim]
profile = "nvidia_nim"
adapter = "openai_chat"
base_url = "https://integrate.api.nvidia.com/v1"
api_key_secret = "NVIDIA_NIM_API_KEY"

[providers.groq]
profile = "groq"
adapter = "openai_chat"
base_url = "https://api.groq.com/openai/v1"
api_key_secret = "GROQ_API_KEY"

[providers.silicon-flow]
profile = "silicon_flow"
adapter = "openai_chat"
base_url = "https://api.siliconflow.com/v1"
api_key_secret = "SILICON_FLOW_API_KEY"

[models.mistral]
targets = [{ provider = "mistral", model = "mistral-small-latest" }]

[models.nous-portal]
targets = [{ provider = "nous-portal", model = "hermes-4-405b" }]

[models.nvidia-nim]
targets = [{ provider = "nvidia-nim", model = "nvidia/llama-3.1-nemotron-ultra-253b-v1" }]

[models.groq]
targets = [{ provider = "groq", model = "llama-3.3-70b-versatile" }]

[models.silicon-flow]
targets = [{ provider = "silicon-flow", model = "deepseek-ai/DeepSeek-V3" }]
