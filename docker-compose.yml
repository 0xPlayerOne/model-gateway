services:
  gateway:
    build:
      context: .
      args:
        MODEL_GATEWAY_UID: "${MODEL_GATEWAY_UID:-1000}"
        MODEL_GATEWAY_GID: "${MODEL_GATEWAY_GID:-1000}"
    command: ["serve"]
    healthcheck:
      test: ["CMD", "model-gateway", "healthcheck"]
      interval: 10s
      timeout: 3s
      start_period: 5s
      retries: 3
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    environment:
      MODEL_GATEWAY_CONFIG: /app/state/config.toml
      MODEL_GATEWAY_SECRET_DIR: /run/model-gateway/secrets
      MODEL_GATEWAY_CONTAINER_MODE: "1"
      RUST_LOG: info
    ports:
      - "127.0.0.1:11434:11434"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.model-gateway:/app/state:ro
      - model-gateway-secrets:/run/model-gateway/secrets:ro

  setup:
    build:
      context: .
      args:
        MODEL_GATEWAY_UID: "${MODEL_GATEWAY_UID:-1000}"
        MODEL_GATEWAY_GID: "${MODEL_GATEWAY_GID:-1000}"
    profiles: ["setup"]
    command: ["setup", "--docker"]
    environment:
      MODEL_GATEWAY_CONFIG: /app/state/config.toml
      MODEL_GATEWAY_SECRET_DIR: /run/model-gateway/secrets
      MODEL_GATEWAY_CONTAINER_MODE: "1"
      RUST_LOG: info
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./.model-gateway:/app/state
      - model-gateway-secrets:/run/model-gateway/secrets

volumes:
  model-gateway-secrets:
